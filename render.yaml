services:
  - type: web
    name: compute_access_shop-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn compute_access_shop_GV:app --host 0.0.0.0 --port 10000
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false                   # Set this in Render dashboard
      - key: LANGSMITH_API_KEY
        sync: false                   # Set this in Render dashboard
      - key: LANGSMITH_PROJECT
        value: week16-shopassist
      - key: LANGCHAIN_TRACING_V2
        value: true
